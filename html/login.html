    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link

      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/default.css" />

  <body>
    <header>
      <a href="/index.html" id="header-logo">
        <div></div>
        <h1>rgrise</h1>
      </a>

      <nav id="header-buttons">
        <a href="#" id="header-buttons__support">Suporte</a>
        <a href="../html/singup.html" id="header-buttons__signup"
          >Registrar-se</a
        >
        <button href="#" id="header-buttons__menu">
          <i class="fa-solid fa-bars"></i>
        </button>
      </nav>
    </header>

    <main>
      <aside>
        <a href="/html/login.html">Entrar</a>
        <a href="/html/singup.html">Registrar-se</a>
        <a href="">Suporte</a>
      </aside>

      <h1>Boas vindas novamente!</h1>
      <p>Estamos felizes com seu retorno</p>

      <form>
        <div class="formInputContainer">
          <label for="">Email</label>
          
          <div class="formInputArea">
            <input type="email" placeholder="Digite seu email" name="" id="" required/>
          </div>
        </div>

        <div class="formInputContainer">
          <label for="">Senha</label>

          <div class="formInputArea">
            <input type="password" placeholder="Digite sua senha" name="" id="" required/>

            <button type="button" class="toggleView">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" id="access-button" disabled>Entrar</button>
      </form>
    </main>

    <footer>&copy;2026 Orgrise, todos os direitos reservados.</footer>

    <script src="../js/script.js"></script>
    <script src="../js/toggleView.js"></script>
